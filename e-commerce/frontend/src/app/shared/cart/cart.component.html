<div class="mx-30 border-t pt-10 border-gray-300">
  <div class="flex items-center gap-1 text-3xl">
    <span class="text-gray-500">Your</span>CART
    <div class="w-15 h-1 bg-black"></div>
  </div>
  <div class="pt-6 flex flex-col gap-4">
    @for (item of cart; track $index) {
      <div
        class="flex gap-4 border-t border-gray-300 pt-4 items-center justify-between"
      >
        <div class="flex">
          <img
            [src]="item.product.image[0]"
            alt=""
            srcset=""
            class="h-30 w-30"
          />
          <div class="text-gray-500 flex flex-col gap-2 pt-3">
            <div>
              {{ item.product.name }}
            </div>
            <div class="flex gap-4 items-center">
              <div>{{ item.product.price }}$</div>
              <div>
                <app-button [variant]="'secondary'" [size]="'small'">
                  {{ item.product.size }}
                </app-button>
              </div>
            </div>
          </div>
        </div>

        <div>
          <input
            #quantity
            type="number"
            name=""
            id=""
            [value]="item.quantity"
            class="w-20 pl-4 border"
            (change)="updateQuantity(item, quantity.value)"
          />
        </div>
        <div>
          <img
            [src]="images.bin"
            alt=""
            srcset=""
            class="w-5 h-5 cursor-pointer"
            (click)="removeItem(item)"
          />
        </div>
      </div>
    }
  </div>
</div>
